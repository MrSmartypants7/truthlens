name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run standalone tests (no Ollama needed)
        run: python tests/test_standalone.py

      - name: Run pytest (unit tests)
        run: pytest tests/test_chunker.py tests/test_vector_store.py -v
